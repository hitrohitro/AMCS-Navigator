version: "3.8"

services:
  backend:
    image: ghcr.io/${GITHUB_OWNER_LOWER}/amcs-navigator:latest
    container_name: amcs-navigator
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - CORS_ORIGIN_REGEX=${CORS_ORIGIN_REGEX}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower:latest
    container_name: amcs-navigator-updater
    restart: unless-stopped
    command:
      - --label-enable
      - --interval
      - "30"
      - --rolling-restart
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
