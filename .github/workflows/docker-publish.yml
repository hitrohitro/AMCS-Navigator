name: Build and Publish Docker Image

on:
  push:
    branches:
      - "**"

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize image repository name
        id: vars
        shell: bash
        run: |
          OWNER_LC="$(printf '%s' "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "image_repo=ghcr.io/${OWNER_LC}/amcs-navigator" >> "$GITHUB_OUTPUT"

      - name: Set image tags
        id: tags
        shell: bash
        run: |
          IMAGE_REPO="${{ steps.vars.outputs.image_repo }}"
          SAFE_REF_NAME="${GITHUB_REF_NAME//\//-}"
          TAGS="${IMAGE_REPO}:${GITHUB_SHA}"

          if [ "${GITHUB_REF_NAME}" = "${GITHUB_EVENT_REPOSITORY_DEFAULT_BRANCH}" ]; then
            TAGS="${TAGS},${IMAGE_REPO}:latest"
          fi

          TAGS="${TAGS},${IMAGE_REPO}:${SAFE_REF_NAME}"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_PAT }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
